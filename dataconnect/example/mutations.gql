mutation CreateAppUser($email: String!, $role: String!, $addedBy: String) @auth(level: PUBLIC) {
  appUsers_insert(data: {
    email: $email
    role: $role
    addedBy: $addedBy
  })
}

mutation UpdateAppUser($id: UUID!, $role: String!) @auth(level: PUBLIC) {
  appUsers_update(id: $id, data: {
    role: $role
  })
}

mutation DeleteAppUser($id: UUID!) @auth(level: PUBLIC) {
  appUsers_delete(id: $id)
}

